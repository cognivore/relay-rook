<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 300px; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #222; background: #fafafa; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: #1a1a2e; color: #eee; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .toggle-wrap { display: flex; align-items: center; gap: 6px; }
    .toggle-wrap label { font-size: 11px; color: #aaa; }
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; inset: 0; background: #555; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
    .toggle .slider::before { content: ""; position: absolute; width: 16px; height: 16px; left: 2px; bottom: 2px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle input:checked + .slider { background: #4CAF50; }
    .toggle input:checked + .slider::before { transform: translateX(16px); }
    .section { padding: 10px 14px; border-bottom: 1px solid #e0e0e0; }
    .section:last-child { border-bottom: none; }
    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #4CAF50; } .dot.gray { background: #9E9E9E; } .dot.red { background: #F44336; }
    .status-label { font-size: 12px; color: #555; }
    .fen-display { font-family: "SF Mono", "Fira Code", monospace; font-size: 11px; color: #333; background: #eee; padding: 6px 8px; border-radius: 4px; word-break: break-all; margin-top: 4px; }
    .config-label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
    .config-input { width: 100%; padding: 5px 8px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; font-family: "SF Mono", "Fira Code", monospace; }
    .config-input:focus { outline: none; border-color: #1a1a2e; }
    .hint { font-size: 10px; color: #999; margin-top: 3px; }
    .orient-row { display: flex; align-items: center; gap: 0; margin-top: 8px; }
    .orient-row .config-label { margin: 0 8px 0 0; flex-shrink: 0; }
    .orient-btn { flex: 1; padding: 4px 0; font-size: 11px; font-weight: 500; border: 1px solid #ccc; background: #fafafa; color: #555; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .orient-btn:first-of-type { border-radius: 4px 0 0 4px; }
    .orient-btn:last-of-type { border-radius: 0 4px 4px 0; }
    .orient-btn + .orient-btn { border-left: none; }
    .orient-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .reconnect-btn { display: block; width: 100%; padding: 6px 0; margin-top: 8px; font-size: 12px; font-weight: 500; color: #1a1a2e; background: #e0e0e0; border: none; border-radius: 4px; cursor: pointer; transition: background 0.15s; }
    .reconnect-btn:hover { background: #d0d0d0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Relay Rook</h1>
    <div class="toggle-wrap">
      <label id="toggle-label">ON</label>
      <div class="toggle">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="slider"></span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="status-row">
      <span class="dot gray" id="status-dot"></span>
      <span class="status-label" id="status-text">Waiting...</span>
    </div>
    <div class="fen-display" id="fen-display">--</div>
    <div class="orient-row">
      <span class="config-label">Orientation</span>
      <button class="orient-btn active" data-orient="auto">Auto</button>
      <button class="orient-btn" data-orient="white">White</button>
      <button class="orient-btn" data-orient="black">Black</button>
    </div>
    <button class="reconnect-btn" id="reconnect-btn">Reconnect</button>
  </div>

  <div class="section">
    <label class="config-label" for="api-url">API URL</label>
    <input class="config-input" id="api-url" type="text" value="http://127.0.0.1:8674" spellcheck="false">
    <div class="hint">relay-rook server address</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
